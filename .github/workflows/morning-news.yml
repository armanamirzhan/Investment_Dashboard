name: Morning news (pre-open)

# Runs at 9 AM ET, Mon-Fri, before NYSE 9:30 ET open.
# Two cron entries handle EDT/EST shift; the TZ check below ensures only the
# 9-AM-ET firing actually runs.
on:
  schedule:
    - cron: "0 13 * * 1-5"  # 13:00 UTC = 9 AM EDT / 8 AM EST
    - cron: "0 14 * * 1-5"  # 14:00 UTC = 10 AM EDT / 9 AM EST
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  actions: write

concurrency:
  group: morning-news
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    env:
      TZ: America/New_York
    steps:
      - uses: actions/checkout@v4

      - name: Skip if news already published today
        id: tz_check
        run: |
          export TZ="America/New_York"
          TODAY=$(date +'%Y-%m-%d')
          NEWS_FILE="data/news_entries_${TODAY}.json"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Manual dispatch — proceeding regardless of state."
          elif [ -f "$NEWS_FILE" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping: $NEWS_FILE already exists. Morning news for $TODAY already published."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Proceeding: no news yet for $TODAY (ET)."
          fi

      - uses: actions/setup-python@v5
        if: steps.tz_check.outputs.skip != 'true'
        with:
          python-version: "3.11"

      - name: Install deps
        if: steps.tz_check.outputs.skip != 'true'
        run: pip install requests yfinance

      - name: Research and update data (Claude Code)
        if: steps.tz_check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Bash,Read,Edit,Write,WebSearch,WebFetch,Grep,Glob"
            --model claude-opus-4-7
          prompt: |
            You are the daily AI investment research agent for the "Investment Landscape" project. This is the **pre-open** run (9 AM ET, Mon-Fri) — your job is to research overnight news and update the dashboard's data before US markets open at 9:30 AM ET.

            ## Project structure

            - Data store: JSON files in `data/`, loaded via `scripts/db_init.py`.
            - Update helpers: `scripts/update_data.py` — every function APPENDS to history; never overwrite past entries.
            - Generators: `scripts/generate_dashboard.py`, `scripts/generate_news.py`, `scripts/generate_reports.py`.
            - Live market data (price, market cap, P/E, P/S, EV/EBITDA, Wall St rating, upside %, day change %) is auto-refreshed hourly by `fetch_prices.py`. **DO NOT manually update those fields** — they will be overwritten on the next hourly refresh.

            ## Step 1 — Research (use WebSearch and WebFetch)

            Cover overnight and early-morning news across these themes:
            - **Earnings** — yesterday's after-hours releases, today's pre-market releases, guidance updates.
            - **Analyst changes** — upgrades, downgrades, new price targets from major desks (GS, MS, JPM, BofA, Wells, Citi, Barclays, Jefferies, etc.).
            - **Datacenter and power deals** — new capacity, PPAs, hyperscaler announcements, NRC approvals.
            - **Asia / Europe close** — TSMC, Samsung, SK Hynix, ASML, Siemens Energy, ABB, Schneider, etc.
            - **Regulation / policy** — chip export controls, tariffs, grid policy, anything affecting AI infrastructure.
            - **Technology breakthroughs** — only if material to a tracked ticker.

            Use trustworthy sources only: Reuters, Bloomberg, WSJ, FT, official company press releases, SEC filings, earnings transcripts. Skip speculation blogs and rumor mills.

            ## Step 2 — Update data

            Call these functions from `scripts/update_data.py`. All of them APPEND; they do not overwrite history.

            ```python
            import sys
            sys.path.insert(0, 'scripts')
            from update_data import (
                add_news_entry,             # headline, summary, sector, sentiment, source_name, source_url
                add_analyst_change,         # ticker, firm, new_rating, new_target, old_rating, old_target
                add_watchlist_signal,       # ticker, signal_type, description, severity
                update_news_brief_tickers,  # tickers_list, signals_list — brief-level summary chips
                update_company,             # ticker, **kwargs — for editorial House Rating / thesis changes only
                update_buildout,            # ticker, **kwargs — hyperscaler capex / power targets
                regenerate_all,
            )
            ```

            ### add_news_entry — sectors

            Use ONE of these tags (these match the existing `news_entries_*.json` vocabulary — note this is **different** from the company taxonomy):
            - `software` — AI models, cloud AI, enterprise software
            - `hardware` — datacenter hardware, networking, cooling, power equipment, fabs, GPUs, memory
            - `energy` — utilities, nuclear, SMR, gas turbines, renewables, fuel cycle, grid
            - `policy` — regulation, export controls, tariffs, government action
            - `integration` — hyperscaler buildouts, PPAs, multi-party deals spanning categories
            - `finance` — earnings, M&A, valuations, capital raises, broad market

            `sentiment` ∈ {`positive`, `neutral`, `negative`}. Every entry MUST include `source_name` and `source_url`.

            Aim for 5–10 entries reflecting the most material moves overnight. If it's a slow news day, 2–3 is fine. Do not fabricate.

            ### add_analyst_change

            Capture every notable rating change. `firm` = bank name (e.g. "Goldman Sachs"). `new_rating` = e.g. "Buy", "Overweight", "Hold". Use `None` for `old_rating` / `old_target` if not reported.

            ### add_watchlist_signal

            Use sparingly — only for genuinely actionable items.
            - `signal_type` ∈ {`momentum`, `undervalued`, `overvalued`, `earnings_beat`, `earnings_miss`, `insider_buy`, `insider_sell`, `legal_risk`, `concentration_risk`, `short_squeeze`}
            - `severity` ∈ {`high`, `medium`, `low`}

            Flag any HIGH-severity items prominently in your final summary.

            ### update_news_brief_tickers

            After writing news entries, set the brief-level summary:
            - `tickers_list` — top tickers in today's news (e.g. `["NVDA", "GEV", "ETN"]`)
            - `signals_list` — top themes (e.g. `["Power constraints", "Hyperscaler capex", "Tariff truce"]`)

            ## Step 3 — Regenerate

            ```python
            regenerate_all()
            ```

            That's it. The workflow handles `deploy_invest.py`, git commit, and push — do NOT call those yourself.

            ## Hard rules

            - NEVER write "DC" — always "datacenter" in full.
            - NEVER touch live-market fields (price, P/E, P/S, EV/EBITDA, market_cap, wallstreet_rating, upside_pct, day_change_pct). Those auto-refresh hourly via `fetch_prices.py`.
            - House Rating (the `rating` field on companies) is editorial. Only change it if news is clearly thesis-altering, and update `thesis` and `catalysts` in the same call to explain why.
            - Every `add_news_entry` requires `source_name` and `source_url`.
            - Run `regenerate_all()` at the end. If it fails, fix the data and retry — don't leave HTML stale.
            - End with a brief summary of what you added (count of news entries, count of analyst changes, any high-severity signals).

      - name: Stage deploy artifact
        if: steps.tz_check.outputs.skip != 'true'
        run: python scripts/deploy_invest.py

      - name: Commit and push if changed
        id: commit
        if: steps.tz_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add data AI_Datacenter_Power_Landscape.html reports morning-news invest
            git commit -m "auto: morning news $(TZ='America/New_York' date '+%Y-%m-%d %H:%M ET')"
            git push
            echo "pushed=true" >> $GITHUB_OUTPUT
          else
            echo "No changes to commit."
            echo "pushed=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Pages deploy
        if: steps.tz_check.outputs.skip != 'true' && steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
